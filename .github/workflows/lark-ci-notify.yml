name: Lark CI/CD Notification

# Repo-activity notifications to Lark (independent of build/deploy):
#   * push (any branch)            -> commit card
#   * pull_request opened          -> PR opened card
#   * pull_request closed & merged -> PR merged card
#
# Uses the shared poster .github/scripts/lark-notify.sh, which no-ops when
# LARK_WEBHOOK_URL is unset, so this stays green before the secret is configured.
#
# Config (Repo Settings -> Secrets and variables -> Actions):
#   secret LARK_WEBHOOK_URL      required to actually send
#   secret LARK_WEBHOOK_SECRET   optional; signs the request

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, closed]

concurrency:
  group: lark-ci-notify-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commit:
    name: commit card
    if: >-
      github.event_name == 'push' &&
      github.event.head_commit != null &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Notify Lark (commit)
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_WEBHOOK_SECRET: ${{ secrets.LARK_WEBHOOK_SECRET }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          sha12="${GITHUB_SHA:0:12}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          commit_url="${{ github.server_url }}/${{ github.repository }}/commit/${GITHUB_SHA}"
          msg="$(printf '%s' "$COMMIT_MSG" | head -n1)"
          text="**Repo**: ${{ github.repository }}\n**Actor**: ${{ github.actor }}\n**Ref**: ${{ github.ref_name }}\n**Event**: push\n**Workflow / Run**: [${{ github.workflow }} #${{ github.run_id }}](${run_url})\n**Commit**: ${sha12}\n**Message**: ${msg}"
          .github/scripts/lark-notify.sh --status info \
            --title "Commit pushed" \
            --text "$text" \
            --button "View Commit" --url "$commit_url"

  pr:
    name: pull request card
    if: >-
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' ||
       (github.event.action == 'closed' && github.event.pull_request.merged == true))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Notify Lark (pull request)
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_WEBHOOK_SECRET: ${{ secrets.LARK_WEBHOOK_SECRET }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.action }}" = "opened" ]; then
            status=info; verb="opened"
          else
            status=success; verb="merged"
          fi
          text="**Repo**: ${{ github.repository }}\n**PR**: #${{ github.event.pull_request.number }} ${PR_TITLE}\n**Author**: ${{ github.event.pull_request.user.login }}\n**Branch**: ${{ github.event.pull_request.base.ref }} <- ${{ github.event.pull_request.head.ref }}\n**Action**: ${verb}"
          .github/scripts/lark-notify.sh --status "$status" \
            --title "Pull request ${verb}" \
            --text "$text" \
            --button "View PR" --url "${{ github.event.pull_request.html_url }}"
