name: dart-build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dart-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  basic-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: CI start notification
        id: start
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_WEBHOOK_SECRET: ${{ secrets.LARK_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          start=$(date +%s)
          echo "start=$start" >> "$GITHUB_OUTPUT"
          sha12="${GITHUB_SHA:0:12}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            trigger="PR #${{ github.event.pull_request.number }} · ${{ github.event.pull_request.title }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            trigger="manual dispatch"
          else
            msg="$(printf '%s' "${{ github.event.head_commit.message }}" | head -n1)"
            trigger="push · ${msg}"
          fi
          .github/scripts/lark-notify.sh --status info \
            --title "Dart CI started" \
            --text "**Repo**: ${{ github.repository }}\n**Actor**: ${{ github.actor }}\n**Ref**: ${{ github.ref_name }}\n**Event**: ${{ github.event_name }}\n**Trigger**: ${trigger}\n**Commit**: ${sha12}\n**Status**: started" \
            --button "View Run" --url "$run_url"

      - name: Setup Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046 # v2.19.0
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run codegen
        run: make -C packages/http generate

      - name: Format
        run: dart format .

      - name: Ensure git is clean
        run: |
          if git diff --quiet; then
            echo "Git is clean!"
          else
            echo "Generated output is stale. Run codegen + format."
            git --no-pager diff
            exit 1
          fi

      - name: Analyze
        run: dart analyze packages/

      - name: Run tests
        run: make test

      - name: CI result notification
        if: always()
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_WEBHOOK_SECRET: ${{ secrets.LARK_WEBHOOK_SECRET }}
          AT_OPENID: ${{ vars.LARK_NOTIFY_AT }}
          START_TS: ${{ steps.start.outputs.start }}
        run: |
          set -euo pipefail
          sha12="${GITHUB_SHA:0:12}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          dur="n/a"
          if [ -n "${START_TS:-}" ]; then
            elapsed=$(( $(date +%s) - START_TS ))
            dur="$((elapsed / 60))m $((elapsed % 60))s"
          fi
          if [ "${{ job.status }}" = "success" ]; then
            .github/scripts/lark-notify.sh --status success \
              --title "Dart CI succeeded" \
              --text "**Repo**: ${{ github.repository }}\n**Actor**: ${{ github.actor }}\n**Ref**: ${{ github.ref_name }}\n**Event**: ${{ github.event_name }}\n**Commit**: ${sha12}\n**Codegen / Analyze / Tests**: success\n**Duration**: ${dur}" \
              --button "View Run" --url "$run_url"
          else
            .github/scripts/lark-notify.sh --status failure \
              --at "$AT_OPENID" \
              --title "Dart CI failed" \
              --text "**Repo**: ${{ github.repository }}\n**Actor**: ${{ github.actor }}\n**Ref**: ${{ github.ref_name }}\n**Event**: ${{ github.event_name }}\n**Commit**: ${sha12}\n**Status**: ${{ job.status }}\n**Duration**: ${dur}" \
              --button "View Logs" --url "$run_url"
          fi
